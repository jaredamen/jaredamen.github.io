<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basecamp has moved</title>
    <meta http-equiv="refresh" content="0; url=https://basecamp-pink.vercel.app" />
    <link rel="canonical" href="https://basecamp-pink.vercel.app" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
        padding: 2rem;
      }
      .container {
        max-width: 500px;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
      }
      a {
        color: #60a5fa;
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
    <script>
      // Client-side fallback in case meta refresh is blocked
      window.location.replace("https://basecamp-pink.vercel.app");
    </script>
  </head>
  <body>
    <div class="container">
      <h1>Basecamp has moved</h1>
      <p>Taking you to the new location&hellip;</p>
      <p>
        If you aren't redirected automatically,
        <a href="https://basecamp-pink.vercel.app">click here to launch Basecamp</a>.
      </p>
    </div>
  </body>
</html>
