name: Update Basecamp PWA

on:
  repository_dispatch:
    types: [update-basecamp]
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  update-basecamp:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Clone basecamp repository
        run: |
          git clone https://github.com/jaredamen/basecamp.git /tmp/basecamp
          
      - name: Install dependencies and build basecamp
        run: |
          cd /tmp/basecamp
          npm install
          npm run build
          
      - name: Remove old basecamp files
        run: |
          rm -rf apps/basecamp/*
          
      - name: Copy new build to apps/basecamp
        run: |
          cp -r /tmp/basecamp/dist/* apps/basecamp/
          
      - name: Check for changes
        id: git-check
        run: |
          git add apps/basecamp/
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "Update Basecamp PWA to latest version"
          git push
          
      - name: No changes detected
        if: steps.git-check.outputs.changes == 'false'
        run: echo "No changes detected in Basecamp PWA - skipping commit"